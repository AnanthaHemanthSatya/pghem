version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: pgxplore-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: pgxplore
      MYSQL_USER: pgxplore
      MYSQL_PASSWORD: pgxplore123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: pgxplore-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:mysql://mysql:3306/pgxplore?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: pgxplore
      DB_PASSWORD: pgxplore123
      JWT_SECRET: docker-compose-jwt-secret-key-minimum-32-chars
      FIREBASE_BUCKET_NAME: ${FIREBASE_BUCKET_NAME:-pgxplore-dev.appspot.com}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./firebase-service-account.json:/app/firebase-service-account.json:ro

volumes:
  mysql_data:
